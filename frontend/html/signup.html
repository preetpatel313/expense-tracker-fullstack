<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinDash - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: rgba(22, 28, 42, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo i {
            font-size: 3rem;
            color: #4b91f7;
            margin-bottom: 12px;
        }
        .logo h1 {
            color: #e8ecf2;
            font-size: 1.8rem;
            font-weight: 800;
        }
        .logo p {
            color: #a0aec0;
            font-size: 0.85rem;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #a0aec0;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0f1520;
            border: 2px solid #1e2a3d;
            border-radius: 14px;
            color: #e8ecf2;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #4b91f7;
            box-shadow: 0 0 0 4px rgba(75, 145, 247, 0.15);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4b91f7, #3069e0);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(75, 145, 247, 0.3);
        }
        .toggle-text {
            text-align: center;
            margin-top: 24px;
            color: #a0aec0;
            font-size: 0.85rem;
        }
        .toggle-text a {
            color: #4b91f7;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .toggle-text a:hover {
            text-decoration: underline;
        }
        .error-msg {
            background: rgba(245, 91, 108, 0.1);
            border: 1px solid rgba(245, 91, 108, 0.3);
            color: #f55b6c;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .success-msg {
            background: rgba(61, 214, 140, 0.1);
            border: 1px solid rgba(61, 214, 140, 0.3);
            color: #3dd68c;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <i class="fas fa-chart-line"></i>
            <h1>FinDash</h1>
            <p>Smart Finance Tracker</p>
        </div>
        
        <div id="messageContainer"></div>
        
        <div id="loginForm">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="loginEmail" placeholder="hello@example.com">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn-primary" id="loginBtn" onclick="handleLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div class="toggle-text">
                Don't have an account? <a onclick="showSignup()">Sign up</a>
            </div>
        </div>

        <div id="signupForm" style="display: none;">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="signupName" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="signupEmail" placeholder="hello@example.com">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="signupPassword" placeholder="••••••••">
            </div>
            <div class="input-group">
                <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                <input type="password" id="signupConfirm" placeholder="••••••••">
            </div>
            <button class="btn-primary" id="signupBtn" onclick="handleSignup()"><i class="fas fa-user-plus"></i> Create Account</button>
            <div class="toggle-text">
                Already have an account? <a onclick="showLogin()">Login</a>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        const API_URL = "http://localhost:5000/api";

        function showMessage(msg, isError = true) {
            const container = document.getElementById("messageContainer");
            container.innerHTML = `<div class="${isError ? 'error-msg' : 'success-msg'}">${msg}</div>`;
            setTimeout(() => {
                container.innerHTML = "";
            }, 4000);
        }

        function showSignup() {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
            document.getElementById("messageContainer").innerHTML = "";
        }

        function showLogin() {
            document.getElementById("signupForm").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
            document.getElementById("messageContainer").innerHTML = "";
        }

        async function handleLogin() {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            const btn = document.getElementById("loginBtn");

            if (!email || !password) {
                showMessage("Please fill in all fields", true);
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            btn.classList.add("loading");

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || data.message || "Login failed");
                }

                // Save token
                localStorage.setItem("token", data.token);
                
                // Save user profile
                if (data.user) {
                    localStorage.setItem("userProfile", JSON.stringify({
                        name: data.user.name,
                        email: data.user.email,
                        currency: "INR",
                        notifications: true
                    }));
                }

                showMessage("Login successful! Redirecting...", false);
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);

            } catch (err) {
                showMessage(err.message, true);
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                btn.classList.remove("loading");
            }
        }

        async function handleSignup() {
            const name = document.getElementById("signupName").value.trim();
            const email = document.getElementById("signupEmail").value.trim();
            const password = document.getElementById("signupPassword").value;
            const confirm = document.getElementById("signupConfirm").value;
            const btn = document.getElementById("signupBtn");

            if (!name || !email || !password) {
                showMessage("Please fill in all fields", true);
                return;
            }

            if (password !== confirm) {
                showMessage("Passwords do not match", true);
                return;
            }

            if (password.length < 6) {
                showMessage("Password must be at least 6 characters", true);
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
            btn.classList.add("loading");

            try {
                const res = await fetch(`${API_URL}/auth/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || data.message || "Signup failed");
                }

                // Save token
                localStorage.setItem("token", data.token);
                
                // Save user profile
                if (data.user) {
                    localStorage.setItem("userProfile", JSON.stringify({
                        name: data.user.name,
                        email: data.user.email,
                        currency: "INR",
                        notifications: true
                    }));
                }

                showMessage("Account created successfully! Redirecting...", false);
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);

            } catch (err) {
                showMessage(err.message, true);
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                btn.classList.remove("loading");
            }
        }

        // Check if already logged in
        if (localStorage.getItem("token")) {
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
