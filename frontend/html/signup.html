<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | FinDash</title>
<style>
  :root {
    --primary: #3b82f6;
    --secondary: #22c55e;
    --accent: #06b6d4;
    --bg-dark: #0f172a;
    --glass-bg: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  body {
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg-dark);
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    opacity: 0.6;
  }

  .box {
    width: 380px;
    padding: 40px;
    border-radius: 24px;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    color: white;
    border: 1px solid var(--glass-border);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 
                0 0 20px rgba(59, 130, 246, 0.1);
    transition: transform 0.3s ease;
  }

  h2 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 25px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 30%, var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .input-group {
    margin-bottom: 18px;
  }

  input {
    width: 100%;
    padding: 14px 16px;
    box-sizing: border-box;
    border-radius: 12px;
    border: 1px solid var(--glass-border);
    background: rgba(0, 0, 0, 0.2);
    color: white;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    outline: none;
  }

  input:focus {
    border-color: var(--primary);
    background: rgba(0, 0, 0, 0.4);
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
  }

  input::placeholder {
    color: rgba(255, 255, 255, 0.4);
  }

  .password-wrapper {
    position: relative;
  }

  .eye-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s;
    user-select: none;
  }

  .eye-icon:hover {
    opacity: 1;
  }

  button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    color: white;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 20px -3px rgba(59, 130, 246, 0.4);
    filter: brightness(1.1);
  }

  button:active {
    transform: translateY(0);
  }

  a {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: #94a3b8;
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.2s;
  }

  a:hover {
    color: #fff;
  }

  #error {
    font-size: 0.85rem;
    margin-bottom: 15px;
    min-height: 1.2rem;
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="box">
  <h2>Create Account</h2>
  <div id="error" style="color:#fb7185; text-align:center;"></div>
  
  <div class="input-group">
    <input type="text" id="name" placeholder="Full Name">
  </div>
  
  <div class="input-group">
    <input type="email" id="email" placeholder="Email Address">
  </div>
  
  <div class="input-group password-wrapper">
    <input type="password" id="password" placeholder="Password">
    <span class="eye-icon" onclick="togglePassword()">👁️</span>
  </div>
  
  <button onclick="handleSignup()">Get Started</button>
  
  <a href="login.html">Already have an account? <span style="color: var(--primary); font-weight: 600;">Login</span></a>
</div>

<script src="/frontend/js/auth.js"></script>
<script>
/* Particle logic remains the same - updated colors to match UI */
function handleSignup(){
  signup(
    document.getElementById("name").value,
    document.getElementById("email").value,
    document.getElementById("password").value
  );
}

function togglePassword(){
  const p = document.getElementById("password");
  p.type = p.type === "password" ? "text" : "password";
}

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];

class Particle {
  constructor(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.vx = (Math.random()-0.5)*0.8;
    this.vy = (Math.random()-0.5)*0.8;
    this.size = Math.random()*1.5;
  }
  move(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x<0||this.x>canvas.width) this.vx*=-1;
    if(this.y<0||this.y>canvas.height) this.vy*=-1;
  }
  draw(){
    ctx.fillStyle="rgba(59, 130, 246, 0.4)"; // Switched to Blue for primary feel
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function init(){
  for(let i=0;i<80;i++) particles.push(new Particle());
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.move();p.draw();});
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

init();
animate();
</script>
</body>
</html>
