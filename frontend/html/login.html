<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | FinDash</title>

<style>
/* ... [Keeping your core reset and body styles] ... */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0f172a;
  overflow: hidden;
}

#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.box {
  width: 360px;
  padding: 35px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  z-index: 10;
}

h2 {
  text-align: center;
  margin-bottom: 24px;
  font-size: 28px;
  background: linear-gradient(90deg,#3b82f6,#22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* INPUT REFINEMENT */
input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: white;
  outline: none;
  transition: border 0.3s ease;
}

input:focus {
  border: 1px solid #3b82f6;
}

.pw-box {
  position: relative;
}

/* Redesigned Toggle Eye */
.toggle-eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: 5px;
  font-size: 18px;
  margin-top: 0; /* Override global button margin */
  width: auto;   /* Override global button width */
}

/* Primary Button */
.btn-login {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg,#3b82f6,#06b6d4);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, opacity 0.2s;
}

.btn-login:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

a {
  display: block;
  text-align: center;
  margin-top: 18px;
  color: #93c5fd;
  text-decoration: none;
  font-size: 14px;
}

a:hover { text-decoration: underline; }

@media (max-width: 480px) {
  .box { width: 90%; padding: 25px; }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="box">
  <h2>FinDash</h2>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <input type="email" id="email" placeholder="Email" required>

    <div class="pw-box">
      <input type="password" id="password" placeholder="Password" required>
      <button type="button" class="toggle-eye" onclick="togglePassword()" aria-label="Toggle Password Visibility">
        <span id="eyeIcon">🙈</span>
      </button>
    </div>

    <button type="submit" class="btn-login">Login</button>
  </form>

  <a href="signup.html">Create new account</a>
</div>

<script src="/frontend/js/auth.js"></script>

<script>
// Prevent default form behavior and call your existing auth.js login
function handleLogin(e){
  e.preventDefault();
  const emailVal = document.getElementById("email").value;
  const passVal = document.getElementById("password").value;
  
  // Calling your function from auth.js
  login(emailVal, passVal);
}

function togglePassword(){
  const pass = document.getElementById("password");
  const icon = document.getElementById("eyeIcon");

  if(pass.type === "password"){
    pass.type = "text";
    icon.innerText = "👁️";
  } else {
    pass.type = "password";
    icon.innerText = "🙈";
  }
}

/* Particle logic (optimized) */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let particles = [];
class Particle {
  constructor(){
    this.init();
  }
  init() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.8;
    this.vy = (Math.random() - 0.5) * 0.8;
    this.size = Math.random() * 2;
  }
  move(){
    this.x += this.vx;
    this.y += this.vy;
    if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }
  draw(){
    ctx.fillStyle = "rgba(59, 130, 246, 0.4)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function init(){
  particles = [];
  for(let i=0; i<80; i++) particles.push(new Particle());
}

function animate(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.move(); p.draw(); });
  requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
